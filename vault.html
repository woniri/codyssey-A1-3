<!-- vault.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타래 - 사유 은하계 (연금술 제어 허브)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    
    <style>
        .vault-wrapper { display: flex; gap: 1.5rem; height: calc(100vh - 140px); min-height: 600px; margin-top: 1rem; }
        #canvas-galaxy { flex: 1; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; position: relative; overflow: hidden; }
        
        #mobile-tag-guard { display: none; flex: 1; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.2rem; overflow-y: auto; }
        .mobile-tag-box { border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 0.75rem; background: var(--bg-color); padding: 1rem; transition: transform 0.2s; }
        .mobile-tag-box:active { transform: scale(0.98); }
        .mobile-tag-title { font-weight: bold; color: var(--accent-color); margin-bottom: 0.5rem; font-size: 1.1rem; }
        
        .inspector-pane { width: 380px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.02); scroll-margin-top: 20px; }
        .inspector-placeholder { margin: auto; text-align: center; color: var(--text-muted); font-size: 0.95rem; font-style: italic; }
        
        .meta-label { font-size: 0.8rem; color: var(--text-muted); font-weight: bold; text-transform: uppercase; letter-spacing: 0.05rem; margin-bottom: 0.3rem; }
        .meta-content { font-size: 1rem; font-weight: 500; line-height: 1.5; color: var(--text-color); }
        .meta-comfort { font-size: 0.9rem; color: #4a6fa5; background: rgba(74,111,165,0.04); padding: 0.75rem; border-radius: 6px; border-left: 3px solid var(--accent-color); font-style: italic; }
        
        .related-thought-item { padding: 0.6rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; line-height: 1.4; }
        
        .alchemy-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(6px); }
        .alchemy-box { background: var(--card-bg); border: 2px solid #e67e22; border-radius: 16px; width: 92%; max-width: 750px; padding: 2.2rem; box-shadow: 0 12px 40px rgba(0,0,0,0.4); animation: scaleUp 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        @keyframes scaleUp { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .alchemy-badge { font-size: 0.9rem; background: rgba(230,126,34,0.12); color: #e67e22; padding: 0.3rem 0.8rem; border-radius: 20px; font-weight: bold; border: 1px solid rgba(230,126,34,0.3); display: inline-block; }
        .toggle-btn-alchemy { padding: 0.5rem 1.2rem; border-radius: 30px; font-weight: bold; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); cursor: pointer; transition: all 0.2s ease; }
        .toggle-btn-alchemy.active { background: #e67e22; color: white; border-color: #e67e22; box-shadow: 0 0 12px rgba(230,126,34,0.4); }
        .galaxy-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        
        @media (max-width: 768px) {
            #canvas-galaxy { display: none !important; }
            #mobile-tag-guard { display: block !important; }
            .vault-wrapper { flex-direction: column; height: auto; }
            .inspector-pane { width: 100%; max-height: 450px; }
        }
    </style>
</head>
<body>

    <!-- 🔒 정돈된 단일 구조 내비게이션 바 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🧵 타래</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html">실마리</a></li>
                <li class="nav-item"><a href="loom.html">베틀</a></li>
                <li class="nav-item active"><a href="vault.html">타래장</a></li>
                <li class="nav-item"><a href="settings.html">설정</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle-btn">🌙 다크 모드</button>
        </div>
    </nav>

    <main class="main-container">
        <div class="galaxy-actions">
            <div>
                <h2 style="font-size: 1.8rem; margin-bottom: 0.2rem;">📂 사유 은하계</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;">무심코 던진 생각 파편들이 성단처럼 유기적으로 요동칩니다. <span class="alchemy-badge">🧪 아이디어 연금술</span></p>
            </div>
            <div>
                <button id="alchemy-toggle-switch" class="toggle-btn-alchemy">🧪 연금술 모드: OFF</button>
            </div>
        </div>

        <div class="vault-wrapper">
            <div id="canvas-galaxy"></div>
            <div id="mobile-tag-guard"><div class="inspector-placeholder">스캔 중...</div></div>

            <!-- 🚨 모바일 스크롤 도킹을 위한 인스펙터 앵커 -->
            <div class="inspector-pane" id="node-inspector">
                <div class="inspector-placeholder" id="inspect-default">
                    🌌 <br><br> 노드를 선택하거나 태그를 클릭하면 <br>심층 큐레이션 목록이 열립니다.
                </div>
                <div id="inspect-content-zone" style="display: none; flex-direction: column; gap: 1.2rem;">
                    <div>
                        <div class="meta-label" id="inspector-title-label">💬 선택된 사유 파편</div>
                        <div class="meta-content" id="view-thought"></div>
                    </div>
                    <div id="hide-on-tag-mode">
                        <div class="meta-label">🕒 관측 시간선</div>
                        <div class="meta-content" id="view-date" style="font-size: 0.9rem; color: var(--text-muted);"></div>
                        <div class="meta-label">🔮 잣아낸 성찰의 실마리</div>
                        <div class="meta-comfort" id="view-comfort"></div>
                    </div>
                    <div>
                        <div class="meta-label">🏷️ 결속된 태그 세트 (클릭 시 역추적)</div>
                        <div id="view-tags" style="display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="alchemy-modal" id="alchemy-stage">
        <div class="alchemy-box">
            <h3 style="color: #e67e22; margin-bottom: 0.3rem; display: flex; align-items: center; gap: 0.5rem;">
                🔮 타래 다중 전문가 사유 연금술 완료
            </h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                통통 튀는 천재 친구 '타래' 내부의 4대 패널 전문가들이 격렬하게 논쟁하여 도출해낸 일류 컨설팅 마크다운 파일 규격입니다.
            </p>
            <div id="alchemy-result-text" style="font-family: monospace; font-size: 0.95rem; line-height: 1.6; color: var(--text-color); background: var(--bg-color); padding: 1.5rem; border-radius: 8px; border-left: 4px solid #e67e22; max-height: 380px; overflow-y: auto; white-space: pre-wrap;"></div>
            <button onclick="closeAlchemyModal()" style="margin-top: 1.2rem; width: 100%; padding: 0.8rem; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                사유 은하계로 복귀하기 →
            </button>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        let allThoughts = [];
        let networkEngine = null;
        let visDataNodes = null;
        let alchemyMode = false; 
        let alchemySelectionStack = [];
        let explosionParticles = [];
        let activeCollisions = new Set();

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof TaraeStorage !== 'undefined') {
                TaraeStorage.init().then(() => { fetchAndBuildVault(); });
            }
            window.addEventListener("resize", handleResponsiveGuard);

            const toggleBtn = document.getElementById("alchemy-toggle-switch");
            toggleBtn.addEventListener("click", () => {
                alchemyMode = !alchemyMode;
                alchemySelectionStack = [];
                if (alchemyMode) {
                    toggleBtn.innerText = "🧪 연금술 모드: ON";
                    toggleBtn.classList.add("active");
                } else {
                    toggleBtn.innerText = "🧪 연금술 모드: OFF";
                    toggleBtn.classList.remove("active");
                }
            });
        });

        function triggerSparkExplosion(x, y, isDeep = false) {
            const count = isDeep ? 30 : 15;
            const colors = isDeep ? ['#e67e22', '#f1c40f', '#e74c3c'] : ['#4a6fa5', '#9bc1ff', '#ffffff'];
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 2;
                explosionParticles.push({
                    x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    size: Math.random() * 2.5 + i*0.1, alpha: 1, decay: Math.random() * 0.04 + 0.02,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        async function fetchAndBuildVault() {
            try {
                const result = await TaraeStorage.getThoughts();
                if (!result || result.error || !result.data || result.data.length === 0) return;

                let dataList = result.data;

                // 🔗 실마리 홈의 하단 지표 클릭으로 넘어온 경우: 필터링된 화면만 보여줌
                const filterType = sessionStorage.getItem("vault_filter_type");
                if (filterType) {
                    sessionStorage.removeItem("vault_filter_type");
                    if (filterType === "projects") {
                        dataList = dataList.filter(t => t.project_id);
                    } else if (filterType === "stale") {
                        dataList = dataList.filter(t => (new Date() - new Date(t.created_at)) > 14 * 24 * 60 * 60 * 1000);
                    }
                }

                if (dataList.length === 0) {
                    document.getElementById("canvas-galaxy").innerHTML = `<div style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-muted); text-align:center; padding:1rem;">🧵 아직 해당하는 생각이 없어요.</div>`;
                    document.getElementById("mobile-tag-guard").innerHTML = `<div class="inspector-placeholder">아직 해당하는 생각이 없어요.</div>`;
                    return;
                }

                allThoughts = dataList;
                buildDesktopGalaxy(allThoughts);
                buildMobileTagGuard(allThoughts);
                handleResponsiveGuard();

                const sharedTag = sessionStorage.getItem("vault_filter_tag");
                if (sharedTag) {
                    sessionStorage.removeItem("vault_filter_tag"); 
                    setTimeout(() => { inspectTagGroup(sharedTag); }, 400); 
                }

                // 🔗 실마리 홈의 "뜻밖의 공명"에서 넘어온 경우: 해당 생각으로 바로 포커스
                const focusId = sessionStorage.getItem("vault_focus_thought");
                if (focusId) {
                    sessionStorage.removeItem("vault_focus_thought");
                    const target = allThoughts.find(t => String(t.id) === String(focusId));
                    if (target) {
                        setTimeout(() => {
                            handleThoughtClick(target);
                            if (networkEngine) networkEngine.focus(`thought_${target.id}`, { scale: 1.2, animation: true });
                        }, 400);
                    }
                }
            } catch (err) { console.error(err); }
        }

        function buildDesktopGalaxy(dataList) {
            const container = document.getElementById("canvas-galaxy");
            const nodes = [];
            const edges = [];
            const tagTracker = new Set();

            dataList.forEach(item => {
                const tNodeId = `thought_${item.id}`;
                nodes.push({
                    id: tNodeId,
                    label: item.content.length > 12 ? item.content.substring(0, 12) + "..." : item.content,
                    shape: 'dot',
                    size: 16,
                    font: { size: 12, color: 'var(--text-color)' },
                    color: { background: 'var(--card-bg)', border: 'var(--accent-color)' },
                    rawData: item
                });

                if (item.tags && Array.isArray(item.tags)) {
                    item.tags.forEach(tag => {
                        const clean = tag.replace('#', '').trim();
                        if (!clean) return;
                        const tagNodeId = `tag_${clean}`;

                        if (!tagTracker.has(tagNodeId)) {
                            tagTracker.add(tagNodeId);
                            nodes.push({
                                id: tagNodeId,
                                label: `#${clean}`,
                                shape: 'box',
                                font: { size: 11, color: '#4a6fa5', font: 'bold' },
                                color: { background: 'rgba(74,111,165,0.06)', border: 'rgba(74,111,165,0.3)' }
                            });
                        }
                        edges.push({ from: tNodeId, to: tagNodeId, length: 80, color: { color: 'rgba(150,150,150,0.1)' } });
                    });
                }
            });

            visDataNodes = new vis.DataSet(nodes);
            const visData = { nodes: visDataNodes, edges: new vis.DataSet(edges) };
            
            const options = {
                physics: {
                    solver: 'barnesHut',
                    barnesHut: { gravitationalConstant: -800, centralGravity: 0.35, springLength: 90, springConstant: 0.04, damping: 0.75 },
                    stabilization: { enabled: true, iterations: 120, updateInterval: 25 }
                }
            };

            networkEngine = new vis.Network(container, visData, options);

            networkEngine.on("stabilizationFinished", function () {
                networkEngine.setOptions({ physics: { enabled: false } });
                console.log("💤 [타래장 인프라] 은하수 별자리 조율 완공. 물리 엔진 세이프티 정지.");
            });

            networkEngine.on("afterDrawing", function (ctx) {
                const nodeIds = visDataNodes.getIds();
                const positions = networkEngine.getPositions(nodeIds);
                
                for (let i = 0; i < nodeIds.length; i++) {
                    for (let j = i + 1; j < nodeIds.length; j++) {
                        const idA = nodeIds[i]; const idB = nodeIds[j];
                        const posA = positions[idA]; const posB = positions[idB]; 
                        if (!posA || !posB) continue;

                        const dx = posA.x - posB.x; const dy = posA.y - posB.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        const collisionKey = `${idA}_${idB}`;

                        if (distance < 34) {
                            if (!activeCollisions.has(collisionKey)) {
                                activeCollisions.add(collisionKey);
                                triggerSparkExplosion((posA.x+posB.x)/2, (posA.y+posB.y)/2, idA.startsWith('thought') && idB.startsWith('thought'));
                            }
                        } else { activeCollisions.delete(collisionKey); }
                    }
                }

                if (explosionParticles.length > 0) {
                    for (let k = explosionParticles.length - 1; k >= 0; k--) {
                        const p = explosionParticles[k]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                        if (p.alpha <= 0) { explosionParticles.splice(k, 1); continue; }
                        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                    }
                    networkEngine.requestRenderTop();
                }
            });

            networkEngine.on("click", function(params) {
                if (params.nodes.length > 0) {
                    const nid = params.nodes[0];
                    const nodeData = visData.nodes.get(nid);

                    if (nid.startsWith("thought_")) {
                        handleThoughtClick(nodeData.rawData);
                        if (alchemyMode) {
                            if (!alchemySelectionStack.includes(nodeData.rawData)) {
                                alchemySelectionStack.push(nodeData.rawData);
                            }
                            if (alchemySelectionStack.length === 2) {
                                triggerIdeaAlchemy(alchemySelectionStack[0], alchemySelectionStack[1]);
                                alchemySelectionStack = [];
                            }
                        }
                    } else if (nid.startsWith("tag_")) {
                        inspectTagGroup(nid.replace("tag_", ""));
                    }
                }
            });
        }

        async function triggerIdeaAlchemy(nodeA, nodeB) {
            const stage = document.getElementById("alchemy-stage");
            document.getElementById("alchemy-result-text").innerText = "🚀 타래 내부 다중 전문가 패널을 소집하여 생각을 재조합하는 중...";
            stage.style.display = "flex";

            try {
                const response = await fetch("/api/connect", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text_a: nodeA.content, text_b: nodeB.content })
                });

                if (!response.ok) throw new Error("서버 응답 오류");
                const json = await response.json();
                if (json.error) throw new Error(json.error);

                const title = json.merged_title || "새로운 기획 초안";
                const content = json.merged_content || "";
                document.getElementById("alchemy-result-text").innerText = `# ${title}\n\n${content}`;
            } catch (e) {
                console.error(e);
                document.getElementById("alchemy-result-text").innerText = "🌙 지금은 두 생각을 조합하지 못했어요. 잠시 후 다시 시도해봐 주세요.";
            }
        }

        // 📊 [태그 다빈도순 정렬 내림차순 가동 조절 장치]
        function buildMobileTagGuard(dataList) {
            const guardBox = document.getElementById("mobile-tag-guard"); guardBox.innerHTML = "";
            const tagMap = {};
            
            dataList.forEach(item => {
                if (item.tags) item.tags.forEach(t => {
                    const clean = t.replace('#', '').trim();
                    if (!clean) return;
                    if (!tagMap[clean]) tagMap[clean] = []; 
                    tagMap[clean].push(item);
                });
            });

            // ⭐ [빈도수 정렬 부품]: 생각 개수가 많은 태그부터 위로 오도록 내림차순 정렬
            const sortedTags = Object.keys(tagMap).sort((a, b) => tagMap[b].length - tagMap[a].length);

            sortedTags.forEach(tag => {
                const box = document.createElement("div"); box.className = "mobile-tag-box";
                box.innerHTML = `<div class="mobile-tag-title" onclick="inspectTagGroup('${tag}')" style="cursor:pointer;">#${tag} <span style="font-size:0.85rem; color:var(--text-muted); font-weight:normal;">(${tagMap[tag].length} 파편)</span></div>`;
                guardBox.appendChild(box);
            });
        }

        function handleResponsiveGuard() {
            if (window.innerWidth <= 768 && networkEngine) { networkEngine.setSize('0px', '0px'); }
            else if (networkEngine) { networkEngine.setSize('100%', '100%'); networkEngine.redraw(); }
        }

        function handleThoughtClick(t) {
            document.getElementById("inspect-default").style.display = "none";
            const zone = document.getElementById("inspect-content-zone"); zone.style.display = "flex";
            document.getElementById("hide-on-tag-mode").style.display = "block";
            document.getElementById("inspector-title-label").innerText = "💬 선택된 사유 파편";
            document.getElementById("view-thought").innerText = t.content;
            document.getElementById("view-date").innerText = new Date(t.created_at).toLocaleString('ko-KR');
            document.getElementById("view-comfort").innerText = t.comfort || "성찰 구절이 비어있습니다.";

            const tagZone = document.getElementById("view-tags"); tagZone.innerHTML = "";
            if (t.tags) t.tags.forEach(tag => {
                const clean = tag.replace('#', ''); const badge = document.createElement("span");
                badge.style.cssText = "font-size: 0.8rem; padding: 0.2rem 0.5rem; background: rgba(74,111,165,0.1); color: var(--accent-color); border-radius: 4px; font-weight: 500; cursor:pointer;";
                badge.innerText = `#${clean}`;
                badge.onclick = (e) => { e.stopPropagation(); inspectTagGroup(clean); };
                tagZone.appendChild(badge);
            });

            // ⚡ 모바일 자동 화면 앵글 하강 밸브
            if (window.innerWidth <= 768) {
                document.getElementById("node-inspector").scrollIntoView({ behavior: "smooth" });
            }
        }

        function inspectTagGroup(tagName) {
            document.getElementById("inspect-default").style.display = "none";
            const zone = document.getElementById("inspect-content-zone"); zone.style.display = "flex";
            document.getElementById("hide-on-tag-mode").style.display = "none";
            document.getElementById("inspector-title-label").innerText = `🏷️ #${tagName} 관측 목록`;
            
            const matched = allThoughts.filter(item => item.tags && item.tags.some(t => t.replace('#', '').trim() === tagName));
            const listContainer = document.getElementById("view-thought"); listContainer.innerHTML = "";
            
            matched.forEach(item => {
                const div = document.createElement("div"); div.className = "related-thought-item";
                div.innerHTML = `<strong>🕒 ${new Date(item.created_at).toLocaleDateString()}:</strong> ${item.content}`;
                listContainer.appendChild(div);
            });

            const tagZone = document.getElementById("view-tags"); tagZone.innerHTML = "";
            allThoughts.forEach(item => {
                if(item.tags) item.tags.forEach(t => {
                    const clean = t.replace('#','');
                    if(clean === tagName && !tagZone.innerHTML.includes(clean)) {
                        const badge = document.createElement("span");
                        badge.style.cssText = "font-size: 0.8rem; padding: 0.2rem 0.5rem; background: rgba(230,126,34,0.1); color: #e67e22; border-radius: 4px; font-weight: bold; cursor:pointer;";
                        badge.innerText = `#${clean}`;
                        badge.onclick = () => inspectTagGroup(clean);
                        tagZone.appendChild(badge);
                    }
                });
            });

            // ⚡ 모바일 태그 터치 시 상세 리스트 뷰포트로 부드러운 유도 작동
            if (window.innerWidth <= 768) {
                document.getElementById("node-inspector").scrollIntoView({ behavior: "smooth" });
            }
        }
        function closeAlchemyModal() { document.getElementById("alchemy-stage").style.display = "none"; }
    </script>
</body>
</html>
