<!-- settings.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타래 - 설정</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🧵 타래</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html">실마리</a></li>
                <li class="nav-item"><a href="loom.html">베틀</a></li>
                <li class="nav-item"><a href="vault.html">타래장</a></li>
                <li class="nav-item active"><a href="settings.html">설정</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle-btn">🌙 다크 모드</button>
        </div>
    </nav>

    <main class="main-container" style="max-width: 600px;">
        <div class="card">
            <h2 style="margin-bottom: 0.5rem;">📮 생각 배달 알림 설정</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">한 주간 쌓인 생각의 변화와 통계를 나만의 메신저 공간으로 정기 배달해 드립니다.</p>

            <!-- 채널 선택 -->
            <div style="margin-bottom: 1.5rem;">
                <label style="display:block; font-weight:bold; margin-bottom:0.5rem;">알림 메신저 채널</label>
                <select id="notify-channel" style="width:100%; padding:0.8rem; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-color); color:var(--text-color); font-size:1rem;">
                    <option value="discord">디스코드 (Discord)</option>
                    <option value="slack">슬랙 (Slack)</option>
                </select>
            </div>

            <!-- 웹훅 주소 입력 -->
            <div style="margin-bottom: 2rem;">
                <label style="display:block; font-weight:bold; margin-bottom:0.5rem;">인커밍 웹훅 URL (Incoming Webhook)</label>
                <input type="text" id="webhook-url" placeholder="https://discord.com/api/webhooks/..." style="width:100%; padding:0.8rem; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-color); color:var(--text-color); font-size:0.95rem;">
            </div>

            <!-- 기능 제어 버튼군 -->
            <div style="display:flex; gap:0.5rem;">
                <button id="btn-save-settings" style="flex:1; padding:0.9rem; background:var(--accent-color); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer; font-size:1rem;">설정 저장하기</button>
                <button id="btn-test-send" style="padding:0.9rem 1.5rem; background:none; border:1px solid var(--border-color); color:var(--text-color); border-radius:6px; cursor:pointer; font-size:0.95rem;">📬 테스트 발송</button>
            </div>
            
            <p id="settings-status" style="margin-top:1rem; text-align:center; font-size:0.9rem; font-weight:500; display:none;"></p>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // 전역 Auth 세션이 준비될 때까지 안전 가동 대기
            setTimeout(loadUserSettings, 600); 

            document.getElementById("btn-save-settings").addEventListener("click", saveUserSettings);
            document.getElementById("btn-test-send").addEventListener("click", triggerTestDispatch);
        });

        // 1. 기존 유저 설정 값 파이썬 백엔드 호출하여 화면 로드
        async function loadUserSettings() {
            const uid = await TaraeStorage.getUserId();
            if (!uid) return;

            try {
                const response = await fetch(`/api/settings?user_id=${uid}`);
                const data = await response.json();
                if (data) {
                    document.getElementById("notify-channel").value = data.notify_channel || "discord";
                    document.getElementById("webhook-url").value = data.webhook_url || "";
                }
            } catch (e) {
                console.error("설정 로드 실패:", e);
            }
        }

        // 2. 입력 설정 값 기재 완료 후 백엔드 서버 전송
        async function saveUserSettings() {
            const uid = await TaraeStorage.getUserId();
            const channel = document.getElementById("notify-channel").value;
            const url = document.getElementById("webhook-url").value.trim();
            const statusText = document.getElementById("settings-status");

            if (!uid) return alert("로그인이 필요합니다.");

            try {
                const response = await fetch("/api/settings", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: uid, channel: channel, url: url })
                });
                
                if (response.ok) {
                    showStatus("정상적으로 알림 채널 설정이 보존되었습니다.", "#2ecc71");
                } else {
                    throw new Error();
                }
            } catch (e) {
                showStatus("설정 보존에 실패했습니다. 다시 시도해 주세요.", "#e74c3c");
            }
        }

        // 3. [과제 핵심 기준] 수동 알림 즉각 테스트 및 실패 메시지 스크리닝
        async function triggerTestDispatch() {
            const uid = await TaraeStorage.getUserId();
            const url = document.getElementById("webhook-url").value.trim();
            const btn = document.getElementById("btn-test-send");

            // [실패 조건 1]: 웹훅 주소 공백 상태 예외 가이드
            if (!url) {
                showStatus("먼저 알림 채널 웹훅 URL을 입력하고 저장해 주세요.", "#e67e22");
                return;
            }

            btn.disabled = true;
            btn.innerText = "발송 중...";

            try {
                const response = await fetch("/api/weekly", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: uid })
                });

                const data = await response.json();

                // [실패 조건 2]: 외부 메신저 서버 전달 차단 에러 팝업 스크리닝
                if (!response.ok) {
                    throw new Error(data.error || "발송에 실패했어요. URL을 다시 확인해주세요.");
                }

                showStatus("🎯 지정한 알림방으로 주간 실타래 편지가 즉시 발송되었습니다!", "#2ecc71");
            } catch (err) {
                showStatus(err.message, "#e74c3c");
            } finally {
                btn.disabled = false;
                btn.innerText = "📬 테스트 발송";
            }
        }

        function showStatus(msg, color) {
            const statusText = document.getElementById("settings-status");
            statusText.innerText = msg;
            statusText.style.color = color;
            statusText.style.display = "block";
            setTimeout(() => { statusText.style.display = "none"; }, 4000);
        }
    </script>
</body>
</html>
