<!-- settings.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타래 - 환경 설정 (외부 발송 허브)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .settings-grid { display: flex; flex-direction: column; gap: 1.5rem; max-width: 650px; margin: 2rem auto; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group label { font-size: 0.95rem; font-weight: bold; color: var(--text-color); }
        .form-control { padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 8px; background: var(--card-bg); color: var(--text-color); font-size: 0.95rem; }
        .form-control:focus { border-color: var(--accent-color); outline: none; }
        
        .btn-zone { display: flex; gap: 1rem; margin-top: 1rem; }
        .btn-save { flex: 1; padding: 0.9rem; background: var(--accent-color); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-test { padding: 0.9rem 1.5rem; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        .status-card { padding: 1rem; border-radius: 8px; background: rgba(74,111,165,0.04); border: 1px solid var(--border-color); font-size: 0.9rem; }
        .future-pipeline { margin-top: 2rem; padding: 1.2rem; border: 1px dashed var(--border-color); border-radius: 12px; background: rgba(230,126,34,0.02); text-align: center; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🧵 타래</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html">실마리</a></li>
                <li class="nav-item"><a href="loom.html">베틀</a></li>
                <li class="nav-item"><a href="vault.html">타래장</a></li>
                <li class="nav-item active"><a href="settings.html">설정</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle-btn">🌙 다크 모드</button>
        </div>
    </nav>

    <main class="main-container">
        <header style="max-width: 650px; margin: 0 auto 1.5rem auto;">
            <h2 style="font-size: 1.8rem; margin-bottom: 0.25rem;">⚙️ 제어 허브</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">사유의 파편들을 수확하여 외부 채널로 밀어내는 인프라를 통제합니다.</p>
        </header>

        <div class="settings-grid">
            <!-- 수집 범위 선택 휠 -->
            <div class="form-group">
                <label>🕒 사유 수확 범위 선택 (시간선 필터)</label>
                <select id="harvest-period" class="form-control" style="cursor: pointer;">
                    <option value="1">최근 1일 (24시간 동안의 사유)</option>
                    <option value="7">최근 1주일간의 타래 수집</option>
                    <option value="30" selected>최근 1달 (30일간의 축적분)</option>
                    <option value="180">최근 6개월간의 거대 사유</option>
                </select>
            </div>

            <!-- 디스코드 웹훅 도크 -->
            <div class="form-group">
                <label>💬 Discord Webhook URL 입력</label>
                <input type="text" id="webhook-discord" class="form-control" placeholder="https://discord.com/api/webhooks/...">
            </div>

            <!-- 슬랙 웹훅 도크 -->
            <div class="form-group">
                <label>📟 Slack Webhook URL 입력</label>
                <input type="text" id="webhook-slack" class="form-control" placeholder="https://hooks.slack.com/services/...">
            </div>

            <!-- 하부 액션 인프라 단추 -->
            <div class="btn-zone">
                <button class="btn-test" id="btn-harvest-test">즉시 테스트 발송 📡</button>
                <button class="btn-save" id="btn-settings-save">설정 및 주소 저장</button>
            </div>

            <!-- 🚀 로드맵 가드 배지 -->
            <div class="future-pipeline">
                <span style="font-weight: bold; color: #e67e22; font-size: 0.9rem;">🔮 미래 연동 파이프라인 개발 로드맵</span>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.4rem; line-height: 1.4;">
                    텔레그램 봇 API 알림 연동 · Notion 데이터베이스 아카이브 페이지 생성 · Google Sheets 사유 로그 자동 적재 모듈이 추후 정밀 업데이트될 예정입니다.
                </p>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 저장된 웹훅 주소 및 설정값 복원
            document.getElementById("webhook-discord").value = localStorage.getItem("tarae_webhook_discord") || "";
            document.getElementById("webhook-slack").value = localStorage.getItem("tarae_webhook_slack") || "";
            document.getElementById("harvest-period").value = localStorage.getItem("tarae_harvest_period") || "30";

            document.getElementById("btn-settings-save").addEventListener("click", saveWebhooks);
            document.getElementById("btn-harvest-test").addEventListener("click", triggerHarvestTest);
        });

        function saveWebhooks() {
            const discord = document.getElementById("webhook-discord").value.trim();
            const slack = document.getElementById("webhook-slack").value.trim();
            const period = document.getElementById("harvest-period").value;

            localStorage.setItem("tarae_webhook_discord", discord);
            localStorage.setItem("tarae_webhook_slack", slack);
            localStorage.setItem("tarae_harvest_period", period);

            alert("💾 외부 채널 연동 주소와 수확 주기가 로컬 환경에 영구 각인되었습니다.");
            location.reload();
        }

        // 📡 디스코드 및 슬랙 실전 크로스 발송 엔진
        async function triggerHarvestTest() {
            const discordUrl = document.getElementById("webhook-discord").value.trim();
            const slackUrl = document.getElementById("webhook-slack").value.trim();
            const periodDays = parseInt(document.getElementById("harvest-period").value);

            if (!discordUrl && !slackUrl) {
                return alert("테스트 발송을 진행할 디스코드 또는 슬랙의 웹훅 주소를 최소 한 개 이상 입력해 주세요.");
            }

            const btn = document.getElementById("btn-harvest-test");
            btn.disabled = true;
            btn.innerText = "연금술 연산 중...";

            try {
                // 수파베이스에서 실제 데이터 추출 필터 가동
                const result = await TaraeStorage.getThoughts();
                let filteredContentSummary = "현재 해당 선택 기간 내에 누적된 실시간 사유 파편이 존재하지 않아, 테스트 샌드박스 프로토콜 모형으로 발송을 대체합니다.";
                
                if (result && result.data && result.data.length > 0) {
                    const now = new Date();
                    const cutoff = new Date(now.getTime() - (periodDays * 24 * 60 * 60 * 1000));
                    
                    const periodThoughts = result.data.filter(t => new Date(t.created_at) >= cutoff);
                    if (periodThoughts.length > 0) {
                        filteredContentSummary = periodThoughts.map((t, idx) => `[파편 ${idx+1}] ${t.content} (태그: ${t.tags?.join(', ')})`).join('\n');
                    }
                }

                // 4대 패널 논쟁 최종 조율 마크다운 본문 페이로드 조립
                const markdownPayload = `# 🌌 [사유의 인하수 수확]: 최근 ${periodDays}일간의 지평 성찰\n\n## 🔍 [해체와 분석]\n• 💡 창의적 파괴자: 수집된 파편들을 교차 융합하여 기존 도메인의 문맥적 장벽을 강제 붕괴시킴.\n• 📈 비즈니스 아키텍트: 축적 데이터 수량 기반 1인 독립 지식 SaaS 비즈니스 고도화 가치 사슬 연동.\n• 🔍 제1원리 분석가: 원일님이 특정 주기마다 생각을 연쇄 수확하려는 본질적 이유는 망각 제어를 넘어 두뇌의 부하를 외부 인프라로 오프로딩하려는 생존 본능임.\n• 🧵 실타래 연결자: 기간 내 포획된 생각 조각들과 과거 노션 메모장의 지식 파이프라인을 관통하는 징검다리 구축.\n\n## 🔗 [의외의 연결성]\n과거 기억 저장소인 \`[[2026_개인_지식_프리미엄_시스템_설계]]\` 노드가 상상 연쇄 결속됩니다. 파편을 묶어 시각화하는 과정은 뇌세포에 강력한 통제 카타르시스를 부여합니다.\n\n## 🎨 [타래의 변주곡 (콘텐츠/사업 초안)]\n원일님의 생각을 요약 없이 디스코드 채널로 실시간 매립하는 개인 지식 발전소 비즈니스 모델 실험 가설을 전개합니다.\n\n## 🧬 [진화의 마중물]\n🚀 "최근 ${periodDays}일 동안 원일님의 사유 궤도에서 가장 무질서하게 튀어 오르고 있는 핵심 화두는 무엇인가요?"\n\n*(데이터 원천 소스 요약):\n${filteredContentSummary}*`;

                // Discord 발송 시도
                if (discordUrl) {
                    await fetch(discordUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ content: markdownPayload })
                    });
                }

                // Slack 발송 시도 (간단 마크다운 포맷팅 호환)
                if (slackUrl) {
                    await fetch(slackUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text: markdownPayload })
                    });
                }

                alert(`📡 [발송 성공]\n\n최근 ${periodDays}일간의 사유 파편 분석 데이터가 외부 채널로 정확하게 투사되었습니다! 디스코드나 슬랙 창을 확인해 보세요.`);

            } catch (err) {
                alert(`❌ 발송 실패: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.innerText = "즉시 테스트 발송 📡";
            }
        }
    </script>
</body>
</html>
