<!-- reset-password.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타래 - 비밀번호 재설정</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <main class="main-container" style="display:flex; justify-content:center; align-items:center; min-height:80vh;">
        <div class="card" style="width:100%; max-width:400px; text-align:center; border:1px solid var(--border-color);">
            <h2 style="color:var(--accent-color); margin-bottom:0.5rem;">🔑 새 비밀번호 설정</h2>
            <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1.5rem;">새로 사용할 비밀번호를 입력해주세요.</p>

            <div id="reset-form-zone">
                <input type="password" id="new-password" placeholder="새 비밀번호 (6자 이상)" style="width:100%; padding:0.8rem; margin-bottom:0.5rem; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-color); color:var(--text-color);">
                <input type="password" id="new-password-confirm" placeholder="새 비밀번호 확인" style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-color); color:var(--text-color);">
                <button id="btn-update-password" style="width:100%; padding:0.8rem; background:var(--accent-color); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">비밀번호 변경하기</button>
            </div>

            <p id="reset-error" style="color:#e74c3c; font-size:0.85rem; margin-top:0.8rem; display:none;"></p>
            <p id="reset-success" style="color:#2ecc71; font-size:0.85rem; margin-top:0.8rem; display:none;"></p>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await TaraeStorage.init();

            // 이메일 링크로 들어왔을 때 Supabase가 자동으로 임시 세션을 만들어줌.
            // 세션이 없다면(직접 URL로 들어온 등) 안내만 하고 변경은 막음.
            const session = await TaraeStorage.getSession();
            if (!session) {
                document.getElementById("reset-form-zone").style.display = "none";
                const errBox = document.getElementById("reset-error");
                errBox.innerText = "유효하지 않거나 만료된 링크예요. 로그인 화면에서 재설정 메일을 다시 요청해주세요.";
                errBox.style.display = "block";
                return;
            }

            document.getElementById("btn-update-password").addEventListener("click", async () => {
                const pw = document.getElementById("new-password").value;
                const pwConfirm = document.getElementById("new-password-confirm").value;
                const errBox = document.getElementById("reset-error");
                const successBox = document.getElementById("reset-success");
                errBox.style.display = "none";
                successBox.style.display = "none";

                if (pw.length < 6) {
                    errBox.innerText = "비밀번호는 6자 이상이어야 해요.";
                    errBox.style.display = "block";
                    return;
                }
                if (pw !== pwConfirm) {
                    errBox.innerText = "두 비밀번호가 서로 달라요.";
                    errBox.style.display = "block";
                    return;
                }

                const btn = document.getElementById("btn-update-password");
                btn.disabled = true;
                btn.innerText = "변경 중...";

                const { error } = await TaraeStorage.updatePassword(pw);

                btn.disabled = false;
                btn.innerText = "비밀번호 변경하기";

                if (error) {
                    errBox.innerText = "변경 실패: " + error.message;
                    errBox.style.display = "block";
                } else {
                    successBox.innerText = "✅ 비밀번호가 변경되었어요. 잠시 후 홈으로 이동해요.";
                    successBox.style.display = "block";
                    document.getElementById("reset-form-zone").style.display = "none";
                    setTimeout(() => { location.href = "index.html"; }, 2000);
                }
            });
        });
    </script>
</body>
</html>
