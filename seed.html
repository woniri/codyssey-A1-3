<!-- seed.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>타래 - 마스터 고정 계정 100단 인젝션 허브</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 3rem; text-align: center; }
        .console-box { background: #000; border: 1px solid #333; padding: 1.5rem; border-radius: 8px; text-align: left; max-width: 800px; margin: 2rem auto; font-family: monospace; max-height: 450px; overflow-y: auto; color: #00ff00; line-height: 1.5; }
        .btn-inject { padding: 1.2rem 2.5rem; background: #e67e22; color: white; border: none; border-radius: 8px; font-size: 1.15rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(230,126,34,0.3); }
        .btn-inject:hover { background: #d35400; }
    </style>
</head>
<body>

    <h2>🧵 타래 인프라 마스터 고정 계정 100단 인젝션 샌드박스</h2>
    <p>고정 계정(test@tarae.app / 123456)으로 도킹한 후, 100개의 교차 시간선 사유 파편을 원격 데이터베이스에 영구 각인합니다.</p>
    
    <button class="btn-inject" id="btn-go">마스터 계정 100단 데이터 폭격 🚀</button>

    <div class="console-box" id="console">Ready to anchor master session...</div>

    <script src="js/storage.js"></script>
    <script>
        const logEl = document.getElementById("console");
        function appendLog(msg) { logEl.innerHTML += `<br>[LOG] ${msg}`; logEl.scrollTop = logEl.scrollHeight; }

        document.getElementById("btn-go").addEventListener("click", async () => {
            appendLog("🚨 고정 마스터 계정 기반 100단 인젝션 시퀀스를 가동합니다.");
            
            await TaraeStorage.init();
            const client = await TaraeStorage.getClient();
            if (!client) return appendLog("❌ 에러: Supabase 터널 무결성 검증 실패.");

            // 🔑 원일님이 지정하신 고정 마스터 자격 증명
            const testEmail = "test@tarae.app";
            const testPassword = "123456";
            let uid = null;

            appendLog(`1단계: 고정 세션 도킹 시도 -> ${testEmail}`);
            
            // [회로 우회 패치]: 기존 유저가 있을 확률이 높으므로 로그인(signIn)부터 선제 타격합니다.
            let { data: signInData, error: signInError } = await client.auth.signInWithPassword({
                email: testEmail, password: testPassword
            });

            if (signInError) {
                appendLog(`💡 로그인 보류 (${signInError.message}). 신규 계정 생성을 위한 원천 가입(signUp) 프로토콜로 전향합니다.`);
                
                const { data: signUpData, error: signUpError } = await client.auth.signUp({
                    email: testEmail, password: testPassword
                });

                if (signUpError) {
                    return appendLog(`❌ 인프라 차단: ${signUpError.message}.<br>※ 만약 Invalid credentials가 지속된다면 수파베이스 Auth 대시보드에서 기존 test@tarae.app 유저를 Delete 하거나 Email Confirmation 토글을 OFF로 꺼주셔야 합니다.`);
                } else {
                    appendLog("✨ 마스터 고정 계정이 데이터베이스에 신규 각인되었습니다. 2차 도킹을 개시합니다.");
                    const { data: retryData, error: retryErr } = await client.auth.signInWithPassword({
                        email: testEmail, password: testPassword
                    });
                    if (retryErr) return appendLog(`❌ 2차 도킹 실패: ${retryErr.message}`);
                    uid = retryData.user.id;
                }
            } else {
                uid = signInData.user.id;
            }

            appendLog(`🟢 [도킹 대성공] 마스터 계정 고유 인증 ID 연동 완공 (UID: ${uid})`);

            // 🎨 100개의 프리미엄 도메인 사유 파편 조합기
            const prefixes = ["Keigo Higashino 작법을 응용한", "1인 SaaS 비즈니스 모델 구조에서", "망각을 정밀 제어하는 최하위 단위를 분석한", "소도시 철도 동선과 서사를 결합한", "옵시디언 그래프의 물리적 반발력을 활용한", "노벨피아 유료 결제 유저의 심리 기저를 해체한", "디스코드와 슬랙 웹훅 파이프라인을 관통하는", "제1원리 분석법에 기반해 인간 본질을 해체한"];
            const middles = ["논리적 인과관계의 공백을 메우는", "수익화 파이프라인의 핵심 넛지 전략을 실현하는", "인간의 본질적 통제 욕망을 극대화하여 자극하는", "공간의 아날로그적 감수성과 증거를 추적하는", "데이터 자산화의 인지적 과부하를 줄여주는", "독립적인 문맥적 장벽을 강제로 부숴버리는"];
            const suffixes = ["혁신적 실험 가설을 전개함.", "초안 시놉시스를 정밀 마운트함.", "인프라 디테일을 투명하게 세척함.", "킬러 피처 아키텍처 사슬을 도출함.", "지식 관리 도구의 새로운 지평을 개척함."];
            const tagsPool = [["추리소설", "인과율플롯"], ["1인SaaS", "비즈니스모델"], ["공간의재발견", "서사아키텍처"], ["망각제어", "제1원리"], ["인터랙션", "콘텐츠", "심층성찰"]];

            appendLog("🚀 [연쇄 적재 연산] 100개의 무결성 시간선 사유 파편 제조 중...");
            const bulkThoughts = [];
            const now = new Date();

            for (let i = 0; i < 100; i++) {
                const prefix = prefixes[i % prefixes.length];
                const middle = middles[i % middles.length];
                const suffix = suffixes[i % suffixes.length];
                const content = `${prefix} ${middle} ${suffix} (마스터 은하계 고유사유 #${i+1})`;
                const tags = tagsPool[i % tagsPool.length];
                const comfort = `정교하게 연결된 고정 성단 조각 #${i+1}은 사유의 지평을 확장합니다.`;
                
                // 시간선 정밀 분산 (5개 최근, 15개 이번주, 80개는 확실한 7일 이전 과거행)
                let dateOffset = 0;
                if (i >= 5 && i < 20) {
                    dateOffset = (i % 5) + 2;
                } else if (i >= 20) {
                    dateOffset = (i % 20) + 10;
                }
                const targetDate = new Date(now.getTime() - (dateOffset * 24 * 60 * 60 * 1000));

                bulkThoughts.push({
                    user_id: uid, content: content, tags: tags, comfort: comfort, created_at: targetDate.toISOString()
                });
            }

            appendLog(`⚡ 총 100개의 고정 계정 데이터를 원격 클라우드로 사출합니다...`);
            const { error: bulkErr } = await client.from("thoughts").insert(bulkThoughts);
            
            if (bulkErr) {
                return appendLog(`❌ 폭격 실패: ${bulkErr.message}`);
            } else {
                appendLog(`🎯 마스터 계정 [test@tarae.app] 내부에 100개 사유 파편 영구 적재 완공!`);
            }

            // 베틀 기본 프로젝트 매핑
            const { error: projError } = await client.from("projects").insert([{
                user_id: uid, title: "마스터 인과율 프리미엄 아키텍처 도입", roadmap: "원일님의 100단 고정 지식 은하계를 엮어내기 위한 베틀 기획선.",
                tasks: [{ id: "task_1", text: "💡 100개 데이터 기반 실시간 메트릭 유효성 최종 스캔", status: "weaving" }],
                created_at: now.toISOString()
            }]);
            
            if (!projError) appendLog("✓ 마스터 베틀 프로젝트 연동 스키마 각인 완공!");

            appendLog("🏆 [완벽 동기화 완료] 이제 로컬(localhost)과 배포판(Vercel) 양쪽에서 메인 새로고침을 하시면 100개 이상의 숫자가 실시간 싱크대 위에서 춤을 추기 시작합니다!");
        });
    </script>
</body>
</html>
