<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>타래 - 데이터 인젝션 샌드박스 (28단 완전체)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; padding: 3rem; text-align: center; }
        .console-box { background: #000; border: 1px solid #333; padding: 1.5rem; border-radius: 8px; text-align: left; max-width: 750px; margin: 2rem auto; font-family: monospace; max-height: 450px; overflow-y: auto; color: #00ff00; line-height: 1.4; }
        .btn-inject { padding: 1rem 2rem; background: #e67e22; color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-inject:hover { background: #d35400; }
    </style>
</head>
<body>

    <h2>🧵 타래 인프라 28단 대량 데이터 인젝션 샌드박스</h2>
    <p>버튼을 누르면 유니크 테스터 계정 생성, 로그인, 28개의 다차원 사유 성단 데이터가 실시간 적재됩니다.</p>
    
    <button class="btn-inject" id="btn-go">은하수 데이터 폭격 개시 🚀</button>

    <div class="console-box" id="console">Ready to inject premium data cluster...</div>

    <script src="js/storage.js"></script>
    <script>
        const logEl = document.getElementById("console");
        function appendLog(msg) { logEl.innerHTML += `<br>[LOG] ${msg}`; logEl.scrollTop = logEl.scrollHeight; }

        document.getElementById("btn-go").addEventListener("click", async () => {
            appendLog("🚨 대량 시드 데이터 폭격 시퀀스를 격발합니다.");
            
            if (typeof TaraeStorage === 'undefined') {
                return appendLog("❌ 에러: js/storage.js 아키텍처가 로드되지 않았습니다.");
            }

            await TaraeStorage.init();
            const client = await TaraeStorage.getClient();
            if (!client) return appendLog("❌ 에러: Supabase 터널 개방에 실패했습니다.");

            // 중복 락 방지용 클린 세척 이메일 엔진
            const uniqueId = Date.now().toString().substring(7);
            const testEmail = `test_${uniqueId}@tarae.app`;
            const testPassword = "123456";

            appendLog(`1단계: 가입 프로토콜 가동 -> 식별 유저: ${testEmail}`);
            const { data: signUpData, error: signUpError } = await client.auth.signUp({
                email: testEmail, password: testPassword
            });

            if (signUpError) return appendLog(`❌ 가입 차단: ${signUpError.message}`);

            appendLog("2단계: 가입 계정 세션 강제 도킹 중...");
            const { data: signInData, error: signInError } = await client.auth.signInWithPassword({
                email: testEmail, password: testPassword
            });

            if (signInError) return appendLog(`❌ 도킹 실패: ${signInError.message}`);

            appendLog(`🟢 도킹 성공. 고유 세션 식별 ID(UID): ${uid}`);

                // 🟡 [최근 1주일 범위 데이터]

                { content: "추리 문학적 알리바이 정밀 장치와 디지털 생산성 도구의 칸반보드를 결합하는 파격적인 Cross-Pollination 기획안 스케치.", tags: ["추리소설", "인터랙션", "콘텐츠"], comfort: "전혀 상반된 두 도메인이 격렬히 충돌할 때 제3지대의 혁신적 기획안이 자아납니다.", created_at: "2026-06-15T13:05:00Z" },
                { content: "구글 시트 연동을 우회하고 로컬 브라우저 세션 스토리지를 프론트엔드 수납함 캐시로 활용하여 성능 최적화 달성하는 가설.", tags: ["서사아키텍처", "망각제어"], comfort: "가장 단순한 인프라 구조가 때로는 가장 강력한 무결성을 입증합니다.", created_at: "2026-06-12T10:40:00Z" },
                { content: "텍스트에 생명력을 불어넣는 다형성 페르소나 주입 기술이 AI 작법 시스템에서 미치는 정서적 각성 메커니즘 연구.", tags: ["콘텐츠", "심층성찰"], comfort: "기계적인 텍스트 요약을 넘어선 통찰만이 인간의 인지 왜곡을 치료합니다.", created_at: "2026-06-08T15:55:00Z" },
                { content: "망각 제어 시스템 '타래'의 초기 MVP 버전을 구축하기 위해 Supabase 인프라 아키텍처를 세척하는 배선 작업.", tags: ["망각제어", "제1원리"], comfort: "복잡한 연결을 걷어내고 최하위 단위의 무결성을 확보하는 것이 인프라의 기본입니다.", created_at: "2026-06-01T10:00:00Z" },
                { content: "디스코드와 슬랙 웹훅 임베드 블록 레이아웃의 시인성을 극대화하기 위한 마크다운 렌더링 파이프라인 조율.", tags: ["1인SaaS", "인터랙션"], comfort: "정보의 전달 격차를 줄이는 시각적 디테일이 사용자의 지속적 사용성을 결정합니다.", created_at: "2026-05-29T11:20:00Z" },

                { content: "온전한 몰입을 방해하는 상영상 상용 스마트폰 알림 공해로부터 개인의 사유를 보호하는 하드웨어 격리 방안.", tags: ["제1원리", "망각제어"], comfort: "연결을 의도적으로 끊어내는 단절의 기술이야말로 현대 최고의 사치재입니다.", created_at: "2026-04-22T09:15:00Z" },
                { content: "Keigo Higashino 작법의 핵심 아키텍처인 '논리적 현실성'을 장착하기 위한 객관적 인과관계 데이터베이스 스키마 설계.", tags: ["추리소설", "서사아키텍처"], comfort: "단단한 사실적 토대 위에 가미된 픽션만이 독자의 몰입을 해치지 않습니다.", created_at: "2026-04-05T14:10:00Z" },
                { content: "사용자의 미완성 낙서를 분해하는 4대 렌즈(창의적 파괴자, 비즈니스 아키텍트, 제1원리, 실타래) 통합 프롬프트 튜닝 스케치.", tags: ["제1원리", "1인SaaS"], comfort: "다중 패널의 인지적 마찰이 거듭될수록 통찰의 예리함은 칼날처럼 날카로워집니다.", created_at: "2026-03-25T11:45:00Z" },

                { content: "공간의 경계가 무너지는 메타버스 가상 자산 시장의 거품 해체와 실질적 공간 서사학의 결합 메커니즘 도출.", tags: ["공간의재발견", "서사아키텍처"], comfort: "가짜 공간에 의미를 부여하는 것은 화려한 그래픽이 아닌 그곳에 흐르는 서사입니다.", created_at: "2026-02-28T10:35:00Z" },
