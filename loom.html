<!-- loom.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타래 - 베틀 워크스페이스 (실시간 사유 직조)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .loom-grid { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; height: calc(100vh - 140px); min-height: 600px; margin-top: 1rem; }
        .thought-rack { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 1.2rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
        .loom-canvas { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 2rem; overflow-y: auto; position: relative; scroll-margin-top: 20px; }
        
        .rack-item { padding: 1rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 10px; cursor: pointer; transition: all 0.2s ease; font-size: 0.95rem; line-height: 1.4; }
        .rack-item:hover { border-color: var(--accent-color); background: rgba(230,126,34,0.02); }
        .rack-item.selected { border-color: #e67e22; background: rgba(230,126,34,0.06); box-shadow: 0 4px 12px rgba(230,126,34,0.1); }
        
        .btn-weave { width: 100%; padding: 0.8rem; background: #e67e22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        .btn-weave:hover { background: #d35400; }
        .btn-weave:disabled { background: var(--border-color); cursor: not-allowed; }

        .battle-panel { margin-top: 1.5rem; border-top: 2px dashed var(--border-color); padding-top: 1.5rem; display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.2rem; }
        .expert-card { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .expert-name { font-weight: bold; font-size: 1.05rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }

        /* 📱 [모바일 탈출 서킷]: 오른쪽 가출 현상 원천 봉쇄 및 스택 정렬 */
        @media (max-width: 768px) {
            .loom-grid { grid-template-columns: 1fr; height: auto; gap: 1rem; }
            .thought-rack { max-height: 300px; }
            .loom-canvas { min-height: 400px; padding: 1.2rem; }
            .battle-panel { grid-template-columns: 1fr; gap: 1rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🧵 타래</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html">실마리</a></li>
                <li class="nav-item active"><a href="loom.html">베틀</a></li>
                <li class="nav-item"><a href="vault.html">타래장</a></li>
                <li class="nav-item"><a href="settings.html">설정</a></li>
            </ul>
            <button id="theme-toggle" class="theme-toggle-btn">🌙 다크 모드</button>
        </div>
    </nav>

    <main class="main-container">
        <div>
            <h2 style="font-size: 1.8rem; margin-bottom: 0.2rem;">🧵 베틀 워크스페이스</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">풀려 있는 사유 파편을 선택하여 4대 패널 전문가와 정밀 직조 대화를 격발하세요.</p>
        </div>

        <div class="loom-grid">
            <div class="thought-rack">
                <h3 style="font-size: 1.1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 0.5rem;">📥 풀려 있는 실가닥</h3>
                <div id="rack-list-zone" style="display:flex; flex-direction:column; gap:0.6rem; flex:1; overflow-y:auto;">
                    <p style="color:var(--text-muted); font-size:0.9rem; text-align:center; margin:auto;">사유 적재 소스 로딩 중...</p>
                </div>
                <button id="trigger-weave-btn" class="btn-weave" disabled>🧵 선택한 사유 직조하기</button>
            </div>

            <!-- 🚨 모바일 추적 오토 앵커 장착 -->
            <div class="loom-canvas" id="loom-workspace-canvas">
                <div id="loom-placeholder" style="text-align:center; margin-top:8rem; color:var(--text-muted);">
                    <span style="font-size:3rem;">🎛️</span>
                    <br><br>왼쪽 랙에서 실가닥을 선택한 뒤 버튼을 누르면<br>원일님의 진짜 사유 분석 매트릭스가 직조됩니다.
                </div>

                <div id="loom-content-zone" style="display:none;">
                    <div style="background:rgba(230,126,34,0.05); padding:1.2rem; border-left:4px solid #e67e22; border-radius:8px; margin-bottom:1.5rem;">
                        <h4 style="color:#e67e22; font-size:1.1rem; margin-bottom:0.4rem;">🎯 현재 정밀 직조 원천 원고</h4>
                        <p id="current-weaving-text" style="font-size:1.05rem; font-weight:500; line-height:1.5;"></p>
                    </div>
                    <h3 style="font-size:1.3rem; margin-top:2rem;">🧬 4대 다중 전문가 패널 교차 검증 (티키타카)</h3>
                    <div class="battle-panel" id="battle-experts-grid"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script>
        let localThoughts = [];
        let selectedThought = null;

        document.addEventListener("DOMContentLoaded", async () => {
            if (typeof TaraeStorage !== 'undefined') {
                await TaraeStorage.init();
                loadRackThoughts();
            }
            document.getElementById("trigger-weave-btn").addEventListener("click", executeWeaveTactics);
        });

        async function loadRackThoughts() {
            const listZone = document.getElementById("rack-list-zone");
            try {
                const result = await TaraeStorage.getThoughts();
                if (result && result.data && result.data.length > 0) {
                    localThoughts = result.data;
                    listZone.innerHTML = "";
                    
                    localThoughts.slice(0, 20).forEach(item => {
                        const div = document.createElement("div");
                        div.className = "rack-item";
                        div.innerText = item.content.length > 55 ? item.content.substring(0, 55) + "..." : item.content;
                        div.addEventListener("click", () => {
                            document.querySelectorAll(".rack-item").forEach(r => r.classList.remove("selected"));
                            div.classList.add("selected");
                            selectedThought = item;
                            document.getElementById("trigger-weave-btn").disabled = false;
                        });
                        listZone.appendChild(div);
                    });
                } else {
                    listZone.innerHTML = `<p style="color:var(--text-muted); text-align:center; margin:auto;">시드 데이터가 비어있습니다.</p>`;
                }
            } catch(e) { console.error(e); }
        }

        async function executeWeaveTactics() {
            if (!selectedThought) return;

            const btn = document.getElementById("trigger-weave-btn");
            btn.disabled = true;
            btn.innerText = "베틀 세포 짜는 중...";

            document.getElementById("loom-placeholder").style.display = "none";
            const contentZone = document.getElementById("loom-content-zone");
            contentZone.style.display = "block";

            const txtEl = document.getElementById("current-weaving-text");
            txtEl.innerText = selectedThought.content;

            const grid = document.getElementById("battle-experts-grid");
            grid.innerHTML = `<p style="color:#e67e22; grid-column:span 2; text-align:center; padding:3rem; font-weight:bold;">⚡ 4대 사유 엔진 연동 중...</p>`;

            const expertMeta = [
                { key: "disruptor", name: "💡 창의적 파괴자 (Disruptor)", color: "#e74c3c" },
                { key: "architect", name: "📈 비즈니스 아키텍트 (Architect)", color: "#2ecc71" },
                { key: "analyst", name: "🔍 제1원리 분석가 (Analyst)", color: "#f1c40f" },
                { key: "connector", name: "🧵 실타래 연결자 (Connector)", color: "#3498db" }
            ];

            try {
                const response = await fetch("/api/expand", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: selectedThought.content })
                });

                if (!response.ok) throw new Error("서버 응답 오류");
                const aiData = await response.json();
                if (aiData.error) throw new Error(aiData.error);

                grid.innerHTML = "";
                expertMeta.forEach(exp => {
                    const card = document.createElement("div");
                    card.className = "expert-card";
                    const text = aiData[exp.key] || "이 관점에서는 아직 분석된 내용이 없어요.";
                    card.innerHTML = `<div class="expert-name" style="color:${exp.color}">${exp.name}</div><p style="font-size:0.95rem; line-height:1.6; color:var(--text-color);">${text}</p>`;
                    grid.appendChild(card);
                });

                // 🎯 실행 가능한 한 걸음: 4개 관점과 별개로, 지금 당장 해볼 수 있는 작은 행동 하나
                if (aiData.next_step) {
                    const stepCard = document.createElement("div");
                    stepCard.style.cssText = "grid-column: span 2; margin-top: 0.5rem; padding: 1rem; border: 1px dashed var(--accent-color); border-radius: 8px; background: rgba(74,111,165,0.05);";
                    stepCard.innerHTML = `<div style="font-weight:bold; color:var(--accent-color); margin-bottom:0.3rem; font-size:0.9rem;">🎯 지금 해볼 수 있는 작은 한 걸음</div><p style="font-size:0.95rem; color:var(--text-color);">${aiData.next_step}</p>`;
                    grid.appendChild(stepCard);
                }
            } catch (err) {
                console.error(err);
                grid.innerHTML = `<p style="color:#e67e22; grid-column:span 2; text-align:center; padding:2rem;">🌙 지금은 4대 전문가 패널을 소집하지 못했어요. 잠시 후 다시 직조해봐 주세요.</p>`;
            }

            btn.disabled = false;
            btn.innerText = "🧵 선택한 사유 직조하기";

            // 🎯 [모바일 카메라 앵글 유도]: 결과 창이 아래 배치되므로 터치 순간 스크롤을 아래로 훅 당김
            if (window.innerWidth <= 768) {
                document.getElementById("loom-workspace-canvas").scrollIntoView({ behavior: "smooth" });
            }
        }
    </script>
</body>
</html>
